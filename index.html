<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTAPL Product Catalogue</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #eef1f5;
  font-family: Arial, sans-serif;
  overflow: hidden;
  height: 100%;
}

.app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #004aad;
  font-size: 20px;
  margin: 8px 0;
  flex-shrink: 0;
}

.viewer {
  width: 100vw;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Loading overlay */
#loadingOverlay {
  position: absolute;
  inset: 0;
  background: #eef1f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #c8d4e8;
  border-top-color: #004aad;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loadingOverlay p {
  font-size: 14px;
  color: #555;
}

#book {
  margin: auto;
  transform-origin: center center;
  transition: transform 0.3s ease;
}

.page {
  background: white;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* Controls bar */
.controls {
  width: 100%;
  flex-shrink: 0;
  min-height: 62px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  background: white;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  flex-wrap: wrap;
  padding: 8px 12px;
}

button {
  padding: 8px 14px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}

button:hover  { background: #003a8c; }
button:active { background: #002d6e; }
button:disabled { background: #a0b4cc; cursor: default; }
button.active { background: #002d6e; }

#pageInfo {
  font-weight: bold;
  color: #333;
  font-size: 14px;
  min-width: 90px;
  text-align: center;
}

/* Jump-to-page input */
#jumpInput {
  width: 52px;
  padding: 7px 6px;
  border: 1px solid #c0cfe0;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  color: #333;
  outline: none;
}

#jumpInput:focus { border-color: #004aad; box-shadow: 0 0 0 2px rgba(0,74,173,0.2); }

/* Toast notification */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333;
  color: white;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 100;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 768px) {
  h1 { font-size: 15px; margin: 6px 0; }
  button { padding: 7px 9px; font-size: 12px; }
  .controls { min-height: 70px; gap: 5px; padding: 6px 8px; }
  #jumpInput { width: 44px; font-size: 12px; }
  #pageInfo { font-size: 12px; min-width: 75px; }
}
</style>
</head>

<body>

<div class="app">
  <h1>BTAPL Product Catalogue</h1>

  <div class="viewer">

    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p>Loading catalogue&hellip;</p>
    </div>

    <div id="book">
      <div class="page"><img src="./Pages/1.jpg"  alt="Page 1"  width="420" height="595" loading="eager"></div>
      <div class="page"><img src="./Pages/2.jpg"  alt="Page 2"  width="420" height="595" loading="eager"></div>
      <div class="page"><img src="./Pages/3.jpg"  alt="Page 3"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/4.jpg"  alt="Page 4"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/5.jpg"  alt="Page 5"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/6.jpg"  alt="Page 6"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/7.jpg"  alt="Page 7"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/8.jpg"  alt="Page 8"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/9.jpg"  alt="Page 9"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/10.jpg" alt="Page 10" width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/11.jpg" alt="Page 11" width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/12.jpg" alt="Page 12" width="420" height="595" loading="lazy"></div>
    </div>

  </div>

  <div class="controls">
    <button id="prevBtn" disabled>&#8592; Prev</button>
    <span id="pageInfo">Page 1 / 12</span>
    <button id="nextBtn">Next &#8594;</button>
    <button id="zoomBtn">&#128269; Zoom</button>
    <button id="fullBtn">&#x26F6; Fullscreen</button>
    <input id="jumpInput" type="number" min="1" max="12" placeholder="Go&#8230;" title="Type a page number and press Enter">
    <button id="pdfBtn">&#8659; Download PDF</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
  var TOTAL_PAGES = 12;
  var PDF_URL     = "./BTAPL-Catalogue.pdf";

  var isMobile = window.innerWidth <= 768;

  // FIX 1: Validate savedPage so stale localStorage values don't cause out-of-range startPage
  var savedPage = parseInt(localStorage.getItem("btapl_page") || "0", 10);
  if (isNaN(savedPage) || savedPage < 0 || savedPage >= TOTAL_PAGES) {
    savedPage = 0;
  }

  // FIX 2: page-flip@2.0.7 browser bundle exposes the constructor as window.PageFlip (NOT St.PageFlip).
  //         We try both names so this works regardless of minor CDN bundle differences.
  var PageFlipConstructor = (window.PageFlip) || (window.St && window.St.PageFlip);

  if (!PageFlipConstructor) {
    document.getElementById("loadingOverlay").innerHTML =
      "<p style='color:#c00;padding:16px;text-align:center'>Error: page-flip library failed to load.<br>Check your internet connection and try again.</p>";
    throw new Error("PageFlip constructor not found on window.");
  }

  var pageFlip = new PageFlipConstructor(document.getElementById("book"), {
    width:    isMobile ? 360 : 420,
    height:   isMobile ? 510 : 595,
    size: "stretch",
    minWidth:  isMobile ? 300  : 360,
    maxWidth:  isMobile ? window.innerWidth - 20 : 900,
    minHeight: isMobile ? 420  : 500,
    maxHeight: isMobile ? window.innerHeight - 145 : window.innerHeight - 120,
    drawShadow: true,
    flippingTime: 700,
    usePortrait: true,
    showCover: true,
    maxShadowOpacity: 0.5,
    mobileScrollSupport: false,
    startPage: savedPage
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));

  // FIX 3: Fallback timeout hides the loading overlay even if the "init" event never fires
  var overlayHidden = false;
  function hideOverlay() {
    if (!overlayHidden) {
      overlayHidden = true;
      document.getElementById("loadingOverlay").style.display = "none";
    }
  }

  setTimeout(hideOverlay, 4000);

  // Hide loading spinner once the library finishes initialising
  pageFlip.on("init", function () {
    hideOverlay();
    updateUI(pageFlip.getCurrentPageIndex());
  });

  // Update controls on every page turn
  pageFlip.on("flip", function (e) {
    updateUI(e.data);
    localStorage.setItem("btapl_page", e.data);
  });

  function updateUI(idx) {
    document.getElementById("pageInfo").textContent = "Page " + (idx + 1) + " / " + TOTAL_PAGES;
    document.getElementById("prevBtn").disabled = (idx === 0);
    document.getElementById("nextBtn").disabled = (idx === TOTAL_PAGES - 1);
  }

  // Prev / Next buttons
  document.getElementById("prevBtn").addEventListener("click", function () {
    pageFlip.flipPrev();
  });
  document.getElementById("nextBtn").addEventListener("click", function () {
    pageFlip.flipNext();
  });

  // Keyboard navigation — left/right arrow keys
  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowLeft")  pageFlip.flipPrev();
    if (e.key === "ArrowRight") pageFlip.flipNext();
  });

  // Jump-to-page: type a number then press Enter
  document.getElementById("jumpInput").addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;
    var n = parseInt(this.value, 10);
    if (!isNaN(n) && n >= 1 && n <= TOTAL_PAGES) {
      pageFlip.turnToPage(n - 1);
      this.value = "";
    } else {
      showToast("Please enter a page between 1 and " + TOTAL_PAGES);
      this.value = "";
    }
  });

  // Zoom toggle
  var zoomed = false;
  document.getElementById("zoomBtn").addEventListener("click", function () {
    zoomed = !zoomed;
    document.getElementById("book").style.transform = zoomed ? "scale(1.3)" : "scale(1)";
    this.classList.toggle("active", zoomed);
    this.textContent = zoomed ? "\uD83D\uDD0D Zoom out" : "\uD83D\uDD0D Zoom";
  });

  // Fullscreen
  document.getElementById("fullBtn").addEventListener("click", function () {
    var el  = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) {
      req.call(el).catch(function () {
        showToast("Fullscreen not available in this browser.");
      });
    } else {
      showToast("Fullscreen is not supported here.");
    }
  });

  // PDF Download — NOTE: works correctly only when served over HTTP/HTTPS.
  // Opening index.html directly via file:// will silently block the download.
  document.getElementById("pdfBtn").addEventListener("click", function () {
    var a = document.createElement("a");
    a.href     = PDF_URL;
    a.download = "BTAPL-Catalogue.pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  // Toast helper — small notification bar, auto-hides after 3 seconds
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 3000);
  }
</script>

</body>
</html>
