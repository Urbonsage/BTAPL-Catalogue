<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTAPL Catalogue</title>

<style>
body {
  margin: 0;
  background: #f4f6f8;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #004aad;
  margin: 20px;
}

#flipbook {
  width: 900px;
  height: 600px;
  margin: 20px auto;
}

#flipbook div {
  width: 450px;
  height: 600px;
  background: white;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

button {
  padding: 10px 20px;
  margin: 10px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>BTAPL Product Catalogue</h1>

<div id="flipbook">
  <div><img src="./Pages/1.jpg"></div>
  <div><img src="./Pages/2.jpg"></div>
  <div><img src="./Pages/3.jpg"></div>
  <div><img src="./Pages/4.jpg"></div>
  <div><img src="./Pages/5.jpg"></div>
  <div><img src="./Pages/6.jpg"></div>
  <div><img src="./Pages/7.jpg"></div>
  <div><img src="./Pages/8.jpg"></div>
  <div><img src="./Pages/9.jpg"></div>
  <div><img src="./Pages/10.jpg"></div>
  <div><img src="./Pages/11.jpg"></div>
  <div><img src="./Pages/12.jpg"></div>
</div>

<div>
  <button onclick="$('#flipbook').turn('previous')">Previous</button>
  <button onclick="$('#flipbook').turn('next')">Next</button>
</div>

<!-- Use CDN for jQuery (more reliable) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Your Turn.js file -->
<script src="./turn.min.js"></script>

<script>
$(window).on("load", function () {
  $("#flipbook").turn({
    width: 900,
    height: 600,
    autoCenter: true,
    display: "double"
  });
});
</script>

</body>
</html>
