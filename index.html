<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTAPL Product Catalogue</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: #eef1f5;
  font-family: Arial, sans-serif;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #004aad;
  font-size: 20px;
  margin: 8px 0;
}

.viewer {
  width: 100vw;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#book {
  margin: auto;
  transform-origin: center center;
  transition: transform 0.3s ease;
}

.page {
  background: white;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.controls {
  width: 100%;
  min-height: 64px;
  padding: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  background: white;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
}

button {
  padding: 8px 12px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

button:hover {
  background: #003a8c;
}

button:disabled {
  background: #9fb3cc;
  cursor: not-allowed;
}

#pageInfo {
  font-weight: bold;
  font-size: 13px;
  color: #333;
}

#jumpInput {
  width: 52px;
  padding: 7px;
  border: 1px solid #c0cfe0;
  border-radius: 8px;
  text-align: center;
}

#toast {
  position: fixed;
  bottom: 78px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  z-index: 9999;
}

@media (max-width: 768px) {
  h1 {
    font-size: 15px;
    margin: 6px 0;
  }

  .controls {
    min-height: 72px;
    gap: 5px;
  }

  button {
    font-size: 12px;
    padding: 7px 9px;
  }

  #pageInfo {
    font-size: 12px;
  }

  #jumpInput {
    width: 44px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="app">
  <h1>BTAPL Product Catalogue</h1>

  <div class="viewer">
    <div id="book">
      <div class="page"><img src="./Pages/1.jpg" alt="Page 1"></div>
      <div class="page"><img src="./Pages/2.jpg" alt="Page 2"></div>
      <div class="page"><img src="./Pages/3.jpg" alt="Page 3"></div>
      <div class="page"><img src="./Pages/4.jpg" alt="Page 4"></div>
      <div class="page"><img src="./Pages/5.jpg" alt="Page 5"></div>
      <div class="page"><img src="./Pages/6.jpg" alt="Page 6"></div>
      <div class="page"><img src="./Pages/7.jpg" alt="Page 7"></div>
      <div class="page"><img src="./Pages/8.jpg" alt="Page 8"></div>
      <div class="page"><img src="./Pages/9.jpg" alt="Page 9"></div>
      <div class="page"><img src="./Pages/10.jpg" alt="Page 10"></div>
      <div class="page"><img src="./Pages/11.jpg" alt="Page 11"></div>
      <div class="page"><img src="./Pages/12.jpg" alt="Page 12"></div>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn">← Prev</button>
    <span id="pageInfo">Page 1 / 12</span>
    <button id="nextBtn">Next →</button>
    <button id="zoomBtn">🔍 Zoom</button>
    <button id="fullBtn">⛶ Fullscreen</button>
    <input id="jumpInput" type="number" min="1" max="12" placeholder="Go">
    <button id="pdfBtn">⇩ PDF</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
const TOTAL_PAGES = 12;
const PDF_URL = "https://urbonsage.github.io/BTAPL-Catalogue/BTAPL-Catalogue.pdf";

const isMobile = window.innerWidth <= 768;
const bookElement = document.getElementById("book");

const PageFlipClass = window.PageFlip || (window.St && window.St.PageFlip);

if (!PageFlipClass) {
  alert("Flipbook library failed to load. Please check internet connection.");
} else {
  const pageFlip = new PageFlipClass(bookElement, {
    width: isMobile ? 340 : 420,
    height: isMobile ? 480 : 595,
    size: "stretch",
    minWidth: isMobile ? 280 : 360,
    maxWidth: isMobile ? window.innerWidth - 24 : 850,
    minHeight: isMobile ? 390 : 500,
    maxHeight: isMobile ? window.innerHeight - 155 : window.innerHeight - 120,
    drawShadow: true,
    flippingTime: 700,
    usePortrait: true,
    showCover: true,
    maxShadowOpacity: 0.5,
    mobileScrollSupport: false,
    startPage: 0
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));

  function updateUI(index) {
    document.getElementById("pageInfo").textContent = "Page " + (index + 1) + " / " + TOTAL_PAGES;
    document.getElementById("prevBtn").disabled = index === 0;
    document.getElementById("nextBtn").disabled = index === TOTAL_PAGES - 1;
  }

  pageFlip.on("flip", function(e) {
    updateUI(e.data);
  });

  pageFlip.on("init", function() {
    updateUI(pageFlip.getCurrentPageIndex());
  });

  document.getElementById("prevBtn").addEventListener("click", function() {
    pageFlip.flipPrev();
  });

  document.getElementById("nextBtn").addEventListener("click", function() {
    pageFlip.flipNext();
  });

  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft") pageFlip.flipPrev();
    if (e.key === "ArrowRight") pageFlip.flipNext();
  });

  document.getElementById("jumpInput").addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;

    const pageNumber = parseInt(this.value, 10);

    if (pageNumber >= 1 && pageNumber <= TOTAL_PAGES) {
      pageFlip.turnToPage(pageNumber - 1);
      this.value = "";
    } else {
      showToast("Enter page number between 1 and " + TOTAL_PAGES);
      this.value = "";
    }
  });

  let zoomed = false;

  document.getElementById("zoomBtn").addEventListener("click", function() {
    zoomed = !zoomed;

    if (zoomed) {
      bookElement.style.transform = isMobile ? "scale(1.12)" : "scale(1.18)";
      this.textContent = "🔍 Fit";
    } else {
      bookElement.style.transform = "scale(1)";
      this.textContent = "🔍 Zoom";
    }
  });

  document.getElementById("fullBtn").addEventListener("click", function() {
    const elem = document.documentElement;

    if (!document.fullscreenElement && elem.requestFullscreen) {
      elem.requestFullscreen().catch(function() {
        showToast("Fullscreen not available on this browser.");
      });
    } else if (document.exitFullscreen) {
      document.exitFullscreen();
    } else {
      showToast("Fullscreen not supported here.");
    }
  });

  document.getElementById("pdfBtn").addEventListener("click", function() {
    window.open(PDF_URL, "_blank");
  });

  updateUI(0);
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.display = "block";

  setTimeout(function() {
    toast.style.display = "none";
  }, 2500);
}
</script>

</body>
</html>
