<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTAPL Catalogue</title>

<style>
body {
  margin: 0;
  background: #f4f6f8;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #004aad;
  margin: 20px;
}

#flipbook {
  margin: auto;
}

#flipbook .page {
  background: white;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

button {
  padding: 10px 20px;
  margin: 10px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>BTAPL Product Catalogue</h1>

<div id="flipbook">
  <div class="page"><img src="Pages/1.png"></div>
  <div class="page"><img src="Pages/2.png"></div>
  <div class="page"><img src="Pages/3.png"></div>
  <div class="page"><img src="Pages/4.png"></div>
  <div class="page"><img src="Pages/5.png"></div>
  <div class="page"><img src="Pages/6.png"></div>
  <div class="page"><img src="Pages/7.png"></div>
  <div class="page"><img src="Pages/8.png"></div>
  <div class="page"><img src="Pages/9.png"></div>
  <div class="page"><img src="Pages/10.png"></div>
  <div class="page"><img src="Pages/11.png"></div>
  <div class="page"><img src="Pages/12.png"></div>
</div>

<div>
  <button onclick="$('#flipbook').turn('previous')">Previous</button>
  <button onclick="$('#flipbook').turn('next')">Next</button>
</div>

<script src="jquery.min.js"></script>
<script src="turn.min.js"></script>

<script>
$("#flipbook").turn({
  width: 900,
  height: 600,
  autoCenter: true
});
</script>

</body>
</html>
