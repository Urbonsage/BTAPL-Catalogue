<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTAPL Catalogue</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #eef1f5;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #004aad;
  font-size: 22px;
  margin: 10px 0;
}

.viewer {
  width: 100vw;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#book {
  margin: auto;
  transition: transform 0.3s ease;
}

.page {
  background: white;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.controls {
  width: 100%;
  min-height: 62px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  background: white;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  flex-wrap: wrap;
}

button {
  padding: 9px 14px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

#pageInfo {
  font-weight: bold;
  color: #333;
  font-size: 14px;
}

@media (max-width: 768px) {
  h1 {
    font-size: 17px;
    margin: 8px 0;
  }

  button {
    padding: 8px 10px;
    font-size: 12px;
  }

  .controls {
    min-height: 70px;
    gap: 6px;
  }
}
</style>
</head>

<body>

<div class="app">
  <h1>BTAPL Product Catalogue</h1>

  <div class="viewer">
    <div id="book">
      <div class="page"><img src="./Pages/1.jpg"></div>
      <div class="page"><img src="./Pages/2.jpg"></div>
      <div class="page"><img src="./Pages/3.jpg"></div>
      <div class="page"><img src="./Pages/4.jpg"></div>
      <div class="page"><img src="./Pages/5.jpg"></div>
      <div class="page"><img src="./Pages/6.jpg"></div>
      <div class="page"><img src="./Pages/7.jpg"></div>
      <div class="page"><img src="./Pages/8.jpg"></div>
      <div class="page"><img src="./Pages/9.jpg"></div>
      <div class="page"><img src="./Pages/10.jpg"></div>
      <div class="page"><img src="./Pages/11.jpg"></div>
      <div class="page"><img src="./Pages/12.jpg"></div>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn">⟵ Previous</button>
    <span id="pageInfo">Page 1 / 12</span>
    <button id="nextBtn">Next ⟶</button>
    <button id="zoomBtn">🔍 Zoom</button>
    <button id="fullBtn">⛶ Fullscreen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
const totalPages = 12;
const isMobile = window.innerWidth <= 768;

const pageFlip = new St.PageFlip(document.getElementById("book"), {
  width: isMobile ? 360 : 420,
  height: isMobile ? 510 : 595,
  size: "stretch",
  minWidth: isMobile ? 300 : 360,
  maxWidth: isMobile ? window.innerWidth - 20 : 900,
  minHeight: isMobile ? 420 : 500,
  maxHeight: isMobile ? window.innerHeight - 145 : window.innerHeight - 120,
  drawShadow: true,
  flippingTime: 700,
  usePortrait: true,
  showCover: true,
  maxShadowOpacity: 0.5,
  mobileScrollSupport: false
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

document.getElementById("prevBtn").addEventListener("click", function () {
  pageFlip.flipPrev();
});

document.getElementById("nextBtn").addEventListener("click", function () {
  pageFlip.flipNext();
});

pageFlip.on("flip", function (e) {
  document.getElementById("pageInfo").innerText = "Page " + (e.data + 1) + " / " + totalPages;
});

let zoomed = false;
document.getElementById("zoomBtn").addEventListener("click", function () {
  zoomed = !zoomed;
  document.getElementById("book").style.transform = zoomed ? "scale(1.25)" : "scale(1)";
});

document.getElementById("fullBtn").addEventListener("click", function () {
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else {
    alert("Fullscreen is not supported on this mobile browser. Please rotate your phone or use browser full-screen mode.");
  }
});
</script>

</body>
</html>
