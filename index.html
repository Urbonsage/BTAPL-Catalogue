<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTAPL Product Catalogue</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #eef1f5;
  font-family: Arial, sans-serif;
  overflow: hidden;
  height: 100%;
}

.app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #004aad;
  font-size: 20px;
  margin: 8px 0;
  flex-shrink: 0;
}

.viewer {
  width: 100vw;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Loading overlay */
#loadingOverlay {
  position: absolute;
  inset: 0;
  background: #eef1f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #c8d4e8;
  border-top-color: #004aad;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loadingOverlay p {
  font-size: 14px;
  color: #555;
}

#book {
  margin: auto;
  transform-origin: center center;
  transition: transform 0.3s ease;
}

.page {
  background: white;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* Controls bar */
.controls {
  width: 100%;
  flex-shrink: 0;
  min-height: 62px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  background: white;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  flex-wrap: wrap;
  padding: 8px;
}

button {
  padding: 8px 14px;
  background: #004aad;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}

button:hover { background: #003a8c; }
button:active { background: #002d6e; }
button:disabled { background: #a0b4cc; cursor: default; }

#pageInfo {
  font-weight: bold;
  color: #333;
  font-size: 14px;
  min-width: 90px;
  text-align: center;
}

/* Jump-to-page input */
#jumpInput {
  width: 52px;
  padding: 7px 6px;
  border: 1px solid #c0cfe0;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  color: #333;
}

#jumpInput:focus { outline: 2px solid #004aad; border-color: transparent; }

/* Toast notification */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333;
  color: white;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 100;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Zoom indicator */
#zoomBtn.active { background: #002d6e; }

@media (max-width: 768px) {
  h1 { font-size: 15px; margin: 6px 0; }
  button { padding: 7px 10px; font-size: 12px; }
  .controls { min-height: 70px; gap: 5px; }
  #jumpInput { width: 44px; font-size: 12px; }
}
</style>
</head>

<body>

<div class="app">
  <h1>BTAPL Product Catalogue</h1>

  <div class="viewer">

    <!-- Loading overlay shown until images ready -->
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p>Loading catalogue&hellip;</p>
    </div>

    <div id="book">
      <div class="page"><img src="./Pages/1.jpg"  alt="Page 1"  width="420" height="595" loading="eager"></div>
      <div class="page"><img src="./Pages/2.jpg"  alt="Page 2"  width="420" height="595" loading="eager"></div>
      <div class="page"><img src="./Pages/3.jpg"  alt="Page 3"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/4.jpg"  alt="Page 4"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/5.jpg"  alt="Page 5"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/6.jpg"  alt="Page 6"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/7.jpg"  alt="Page 7"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/8.jpg"  alt="Page 8"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/9.jpg"  alt="Page 9"  width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/10.jpg" alt="Page 10" width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/11.jpg" alt="Page 11" width="420" height="595" loading="lazy"></div>
      <div class="page"><img src="./Pages/12.jpg" alt="Page 12" width="420" height="595" loading="lazy"></div>
    </div>

  </div>

  <div class="controls">
    <button id="prevBtn" disabled>&#8592; Prev</button>
    <span id="pageInfo">Page 1 / 12</span>
    <button id="nextBtn">Next &#8594;</button>
    <button id="zoomBtn">&#128269; Zoom</button>
    <button id="fullBtn">&#x26F6; Fullscreen</button>
    <input id="jumpInput" type="number" min="1" max="12" placeholder="Go" title="Jump to page">
    <button id="pdfBtn">&#8659; PDF</button>
  </div>
</div>

<div id="toast"></div>

<!-- Pinned version to avoid unexpected breaking changes -->
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>
const TOTAL_PAGES = 12;
const isMobile = window.innerWidth <= 768;
const PDF_URL = "./BTAPL-Catalogue.pdf"; // update path if needed

// Restore last-visited page from localStorage
const savedPage = parseInt(localStorage.getItem("btapl_page") || "0", 10);

const pageFlip = new PageFlip(document.getElementById("book"), {
  width:    isMobile ? 360 : 420,
  height:   isMobile ? 510 : 595,
  size: "stretch",
  minWidth:  isMobile ? 300 : 360,
  maxWidth:  isMobile ? window.innerWidth - 20 : 900,
  minHeight: isMobile ? 420 : 500,
  maxHeight: isMobile ? window.innerHeight - 145 : window.innerHeight - 120,
  drawShadow: true,
  flippingTime: 700,
  usePortrait: true,
  showCover: true,
  maxShadowOpacity: 0.5,
  mobileScrollSupport: false,
  startPage: savedPage
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

// Hide loading overlay once the first flip event fires (library is ready)
pageFlip.on("init", function () {
  document.getElementById("loadingOverlay").style.display = "none";
  updateUI(pageFlip.getCurrentPageIndex());
});

// Update page info + button states on every flip
pageFlip.on("flip", function (e) {
  const idx = e.data;
  updateUI(idx);
  localStorage.setItem("btapl_page", idx);
});

function updateUI(idx) {
  const page = idx + 1;
  document.getElementById("pageInfo").textContent = "Page " + page + " / " + TOTAL_PAGES;
  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === TOTAL_PAGES - 1;
}

// Navigation buttons
document.getElementById("prevBtn").addEventListener("click", function () {
  pageFlip.flipPrev();
});
document.getElementById("nextBtn").addEventListener("click", function () {
  pageFlip.flipNext();
});

// Jump-to-page
document.getElementById("jumpInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    const n = parseInt(this.value, 10);
    if (n >= 1 && n <= TOTAL_PAGES) {
      pageFlip.turnToPage(n - 1);
      this.value = "";
    } else {
      showToast("Enter a page number between 1 and " + TOTAL_PAGES);
      this.value = "";
    }
  }
});

// Keyboard navigation
document.addEventListener("keydown", function (e) {
  if (e.key === "ArrowLeft")  pageFlip.flipPrev();
  if (e.key === "ArrowRight") pageFlip.flipNext();
});

// Zoom toggle
let zoomed = false;
document.getElementById("zoomBtn").addEventListener("click", function () {
  zoomed = !zoomed;
  document.getElementById("book").style.transform = zoomed ? "scale(1.3)" : "scale(1)";
  this.classList.toggle("active", zoomed);
  this.textContent = zoomed ? "\uD83D\uDD0D Zoom out" : "\uD83D\uDD0D Zoom";
});

// Fullscreen
document.getElementById("fullBtn").addEventListener("click", function () {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen;
  if (req) {
    req.call(el).catch(function () {
      showToast("Fullscreen not available in this browser.");
    });
  } else {
    showToast("Fullscreen not supported here.");
  }
});

// PDF download
document.getElementById("pdfBtn").addEventListener("click", function () {
  const a = document.createElement("a");
  a.href = PDF_URL;
  a.download = "BTAPL-Catalogue.pdf";
  a.click();
});

// Toast helper
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function () { t.classList.remove("show"); }, 3000);
}
</script>

</body>
</html>
